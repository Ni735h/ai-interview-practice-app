name: ai_interview_app
description: "AI Interview Practice App with Firebase and ML features"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  speech_to_text: ^6.6.2
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.8
  cupertino_icons: ^1.0.6
  cloud_firestore: ^4.15.0
  google_sign_in: ^6.2.2
  google_fonts: ^6.1.0
  file_picker: ^8.0.5
  flutter_tts: ^4.0.2
  animated_text_kit: ^4.2.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.1.5
  camera: ^0.10.5+5
  permission_handler: ^11.3.1
  google_mlkit_face_detection: ^0.10.1
  image: ^4.1.3
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  

flutter:
  uses-material-design: true
  
 